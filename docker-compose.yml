services:
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
    environment:
      DATABASE_URL: postgresql://invoices:invoices123@db:5432/invoices?schema=public
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://invoices:invoices123@db:5432/invoices?schema=public
      COMPANY_NIP: ${COMPANY_NIP:-9876543210}
      KSEF_TOKEN: ${KSEF_TOKEN:-mock}
      KSEF_NIP: ${KSEF_NIP:-9876543210}
      KSEF_ENV: ${KSEF_ENV:-mock}
      CRON_SECRET: ${CRON_SECRET:-development-only-change-me}
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-10}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: invoices
      POSTGRES_PASSWORD: invoices123
      POSTGRES_DB: invoices
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Profil deweloperski wystawia DB wyłącznie na loopback hosta.
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U invoices -d invoices"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
